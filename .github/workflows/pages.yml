# Build the PecanX site and deploy it to GitHub Pages.
#
# Enable Pages for the repo (Settings → Pages → Source: GitHub Actions). On every
# push to the default branch this builds dist/ with `node playground/build.mjs`
# and publishes it. The site is fully static — no server runtime is required.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # WasmGC (struct/array) is enabled by default on Node 22+; the wasm tests need it
      - name: Run the test suite
        run: node compiler/tests/run.js
      - name: Build the static site
        run: node playground/build.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
