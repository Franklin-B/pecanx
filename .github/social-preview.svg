<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b27"/>
      <stop offset="1" stop-color="#0e1014"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="-8%" r="75%">
      <stop offset="0" stop-color="#26324c" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0e1014" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="6" fill="#c98a3a"/>

  <!-- brand watermark -->
  <text x="1240" y="470" font-size="540" fill="#c98a3a" opacity="0.06" text-anchor="end">◗</text>

  <!-- wordmark -->
  <text x="80" y="130" font-size="40" fill="#c98a3a">◗</text>
  <text x="128" y="130" font-size="40" font-weight="700" fill="#e6e8ec" letter-spacing="0.5">PecanX</text>

  <!-- headline -->
  <text x="78" y="258" font-size="64" font-weight="800" fill="#e6e8ec" letter-spacing="-1.2">A correctness-first</text>
  <text x="78" y="334" font-size="64" font-weight="800" fill="#e6e8ec" letter-spacing="-1.2">language for the <tspan fill="#c98a3a">web</tspan></text>

  <!-- subtag -->
  <text x="80" y="388" font-size="25" fill="#9aa3b2">Pure logic compiles to one shared WebAssembly Kernel · interface code to JavaScript</text>

  <!-- feature pills -->
  <g>
    <rect x="80"  y="430" width="150" height="46" rx="23" fill="#171b24" stroke="#2b3240"/>
    <circle cx="104" cy="453" r="4" fill="#c98a3a"/>
    <text x="118" y="460" font-size="20" fill="#cdd3dd">no null</text>
  </g>
  <g>
    <rect x="246" y="430" width="212" height="46" rx="23" fill="#171b24" stroke="#2b3240"/>
    <circle cx="270" cy="453" r="4" fill="#c98a3a"/>
    <text x="284" y="460" font-size="20" fill="#cdd3dd">no exceptions</text>
  </g>
  <g>
    <rect x="474" y="430" width="292" height="46" rx="23" fill="#171b24" stroke="#2b3240"/>
    <circle cx="498" cy="453" r="4" fill="#c98a3a"/>
    <text x="512" y="460" font-size="20" fill="#cdd3dd">no impossible states</text>
  </g>
  <g>
    <rect x="782" y="430" width="318" height="46" rx="23" fill="#171b24" stroke="#2b3240"/>
    <circle cx="806" cy="453" r="4" fill="#c98a3a"/>
    <text x="820" y="460" font-size="20" fill="#cdd3dd">no client/server drift</text>
  </g>

  <!-- footer -->
  <text x="80" y="582" font-size="22" fill="#7c8497"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">franklin-b.github.io/pecanx</text>
  <text x="1200" y="582" font-size="20" fill="#6b7385" text-anchor="end">MIT · open source</text>
</svg>
